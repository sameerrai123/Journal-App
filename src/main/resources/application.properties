#      notes
#? 1. SonarQube (Server ? Self Hosted)
#? What it is
#
#A self-hosted code quality server used in CI/CD for Spring Boot projects.
#
#? Used for
#Backend quality checks (bugs, security, code smells)
#Pull request analysis
#Quality Gates in Jenkins / GitHub / GitLab pipelines
#? Spring Boot relevance
#Detects:
#Bad Spring patterns
#Security issues (e.g., unsafe endpoints)
#Code smells in services/controllers/repositories
#Works best with Maven / Gradle builds
#? Java/Spring support
#Java 8, 11, 17 fully supported (modern versions)
#Spring Boot frameworks supported (Spring, Spring Security, Hibernate)
#?? 2. SonarCloud (Cloud version)
#? What it is
#
#A cloud-hosted version of SonarQube (no server setup needed)
#
#? Used for
#GitHub / GitLab / Azure DevOps integration
#Automatic PR analysis
#Hosted quality dashboard
#? Spring Boot use
#Same rule engine as SonarQube
#Best for teams who don?t want to maintain infrastructure
#? Key difference from SonarQube
#Feature	SonarQube	SonarCloud
#Hosting	Self-hosted	Cloud
#Setup	Complex	Easy
#Maintenance	Required	None
#CI integration	Yes	Yes
#? 3. SonarLint (IDE Plugin / Sonar IDE)
#? What it is
#
#A real-time code analysis tool inside IDEs like:
#
#IntelliJ IDEA
#VS Code
#Eclipse
#? Used for
#Instant feedback while coding Spring Boot
#Finds issues before committing code
#? Spring Boot benefit
#Highlights:
#Bad dependency injection usage
#Null pointer risks
#Security misconfigurations
#Code smells in services/controllers
#? Modes
#Standalone mode ? uses local rules
#Connected mode ? syncs with SonarQube/SonarCloud rules

#Developer writes code
#?
#SonarLint (instant issues in IDE)
#?
#Push code to Git
#?
#SonarQube / SonarCloud runs CI analysis
#?
#Quality Gate passes/fails